<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Turkish Chromium</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      overflow: hidden;
      background: #ffffff;
    }

    .browser-chrome {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
      border-bottom: 1px solid #dee2e6;
      z-index: 1000;
      display: flex;
      flex-direction: column;
    }

    /* Tab Bar */
    .tab-bar {
      height: 40px;
      background: #E30A17;
      display: flex;
      align-items: flex-end;
      padding: 0 8px;
      gap: 2px;
    }

    .tab {
      height: 36px;
      min-width: 180px;
      max-width: 240px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 8px 8px 0 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      cursor: pointer;
      transition: background 0.15s;
      color: #ffffff;
      font-size: 13px;
      position: relative;
    }

    .tab:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    .tab.active {
      background: #ffffff;
      color: #212529;
      height: 40px;
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .tab-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
    }

    .tab-close {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
      transition: background 0.15s;
    }

    .tab-close:hover {
      background: rgba(0, 0, 0, 0.1);
    }

    .new-tab-btn {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #ffffff;
      font-size: 18px;
      transition: background 0.15s;
      margin: 0 4px;
    }

    .new-tab-btn:hover {
      background: rgba(255, 255, 255, 0.5);
    }

    /* Toolbar */
    .toolbar {
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      background: #ffffff;
    }

    .nav-buttons {
      display: flex;
      gap: 4px;
    }

    .nav-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #495057;
      transition: all 0.15s;
    }

    .nav-btn:hover:not(:disabled) {
      background: #e9ecef;
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .logo {
      width: 32px;
      height: 32px;
      margin: 0 8px;
    }

    .address-bar-container {
      flex: 1;
      height: 44px;
      background: #ffffff;
      border: 2px solid #E30A17;
      border-radius: 22px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      transition: all 0.15s;
    }

    .address-bar-container:focus-within {
      border-color: #B50812;
      box-shadow: 0 0 0 3px rgba(227, 10, 23, 0.1);
    }

    .address-bar {
      flex: 1;
      border: none;
      outline: none;
      font-size: 14px;
      color: #212529;
      background: transparent;
    }

    .bookmark-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #6c757d;
      transition: all 0.15s;
    }

    .bookmark-btn:hover {
      background: #e9ecef;
    }

    .bookmark-btn.bookmarked {
      color: #E30A17;
    }

    .menu-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #495057;
      transition: all 0.15s;
    }

    .menu-btn:hover {
      background: #e9ecef;
    }

    /* Loading Indicator */
    .loading-bar {
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      background: #E30A17;
      width: 0;
      transition: width 0.3s;
    }

    .loading-bar.loading {
      animation: loading 2s ease-in-out infinite;
    }

    @keyframes loading {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }

    /* Dropdown Menu */
    .menu-dropdown {
      position: fixed;
      top: 90px;
      right: 16px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
      padding: 8px 0;
      min-width: 200px;
      display: none;
      z-index: 2000;
    }

    .menu-dropdown.visible {
      display: block;
    }

    .menu-item {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      color: #212529;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-item:hover {
      background: #f8f9fa;
    }

    .menu-separator {
      height: 1px;
      background: #dee2e6;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="browser-chrome">
    <div class="loading-bar" id="loadingBar"></div>
    
    <!-- Tab Bar -->
    <div class="tab-bar">
      <div id="tabsContainer"></div>
      <div class="new-tab-btn" id="newTabBtn">+</div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="nav-buttons">
        <button class="nav-btn" id="backBtn" title="Back" disabled>←</button>
        <button class="nav-btn" id="forwardBtn" title="Forward" disabled>→</button>
        <button class="nav-btn" id="reloadBtn" title="Reload">↻</button>
      </div>

      <img src="../public/assets/logo.png" alt="Logo" class="logo">

      <div class="address-bar-container">
        <input
          type="text"
          class="address-bar"
          id="addressBar"
          placeholder="Search or enter website address"
        />
        <button class="bookmark-btn" id="bookmarkBtn" title="Bookmark this page">★</button>
      </div>

      <button class="menu-btn" id="menuBtn" title="Menu">⋮</button>
    </div>
  </div>

  <!-- Menu Dropdown -->
  <div class="menu-dropdown" id="menuDropdown">
    <div class="menu-item" id="newTabMenuItem">📄 New Tab</div>
    <div class="menu-separator"></div>
    <div class="menu-item" id="historyMenuItem">📚 History</div>
    <div class="menu-item" id="bookmarksMenuItem">⭐ Bookmarks</div>
    <div class="menu-separator"></div>
    <div class="menu-item" id="settingsMenuItem">⚙️ Settings</div>
    <div class="menu-item" id="aboutMenuItem">ℹ️ About Turkish Chromium</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
